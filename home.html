<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>백야:기담록</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="logo">
    <img src="images/logo.jpg" alt="백야:기담록">
  </div>

  <nav>
    <a href="#">공지사항</a>
    <a href="#">세계관</a>
    <a href="#">캐릭터</a>
    <a href="#">제출</a>
    <a href="#">이벤트</a>
  </nav>

  <div class="auth">
    <button class="login" onclick="location.href='login/login.html'">로그인</button>
    <button class="signup" onclick="location.href='signup/signup.html'">회원가입</button>
  </div>
</header>

<!-- HERO -->
<section class="hero">

  <img src="images/mainlogo.png" class="hero-bg">

  <div class="hero-overlay">
    <p>밤이 사라진 세계, 기록은 시작된다</p>
  </div>

  <div class="buttons">
    <button>괴담 둘러보기</button>
    <button class="outline">이야기 제출</button>
  </div>

</section>

<!-- NOTICE -->
<section class="notice fade-in">
  <div class="notice-box">
    <h3>공지사항</h3>
    <ul>
      <li>사이트 업데이트 안내</li>
      <li>이벤트 시작 안내</li>
      <li>서버 점검 공지</li>
    </ul>
  </div>

  <div class="notice-box">
    <h3>이달의 추천 기담</h3>
    <ul>
      <li>기담 제목 1</li>
      <li>기담 제목 2</li>
      <li>기담 제목 3</li>
    </ul>
  </div>
</section>

<!-- CARDS -->
<section class="cards">
  <div class="card fade-in">괴담 기록</div>
  <div class="card fade-in">캐릭터</div>
  <div class="card fade-in">제출</div>
  <div class="card fade-in">이벤트</div>
</section>

<!-- CTA -->
<section class="cta fade-in">
  <h2>당신의 이야기가 기담이 되는 곳</h2>
  <button>이야기 제출하기</button>
</section>

<!-- FOOTER -->
<footer class="footer">
  © 2026 백야:기담록
</footer>

<script src="js/script.js"></script>
</body>
</html>
