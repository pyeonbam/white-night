<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>비밀번호 찾기 - 백야:기담록</title>
    <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="login.css">
</head>
<body>
<!-- HEADER -->
<header class="header">
  <div class="logo">
    <a href="../index.html"><img src="../logo.png" alt="백야:기담록"></a>
  </div>
  <nav>
    <a href="#">공지사항</a>
    <a href="#">세계관</a>

  <div class="auth">

    <!-- 버튼 -->
    <button class="login-btn" onclick="findPassword()">비밀번호 찾기</button>

    <!-- 하단 -->
    <div class="extra">
      <a href="login.html">로그인으로 돌아가기</a>
      <a href="sign-up.html">회원가입</a>
